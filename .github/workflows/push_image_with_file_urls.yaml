name: Image from File URLs

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Comma-separated list of URLs to download'
        required: true
        type: string
      tag:
        description: 'dest tag'
        required: true
        default: 'latest'
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Download files
        run: |
          set -e
          mkdir -p downloads
          IFS=',' read -ra URLS <<< "${{ github.event.inputs.urls }}"
          for url in "${URLS[@]}"; do
            url=$(echo "$url" | xargs)  # trim whitespace
            if [[ "$url" == *.git ]]; then
              name="$(echo "$url" | sed -E -e 's#[:/]#/#g' -e 's#.*//##')"
              echo "Cloning $url to downloads/${name//\//__}..."
              git clone --mirror "$url" "downloads/${name//\//__}"
            else
              echo "Downloading: $url"
              wget --content-disposition -P downloads "$url" || curl -o "downloads/$(basename "$url")" "$url"
            fi
            echo "$url" | tee -a "URLs.list"
          done
      
      - name: Generate Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM scratch
          
          COPY downloads/ /downloads/
          COPY URLs.list /URLs.list
          WORKDIR /
          EOF
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/downloaded-files:${{ github.event.inputs.tag }}
