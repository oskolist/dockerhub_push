name: "Mirror image from user input"

on:
  workflow_dispatch:
    inputs:
      images:
        description: 'Comma-separated list of docker images to mirror'
        required: true
        type: string
      registry:
        description: 'destination registery. e.g docker.io/yourusername'
        required: true
        type: string
jobs:
  mirror:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Regctl
        run: |
          curl -L https://github.com/regclient/regclient/releases/latest/download/regctl-linux-amd64 >regctl
          chmod 755 regctl
      - name: Do mirror
        run: |
          IFS=',' read -ra IMAGES <<< "${{ github.event.inputs.images }}"
          for image in "${IMAGES[@]}"; do
            image=$(echo "$image" | xargs) # trim whitespace
            reg="${{ github.event.inputs.registry }}"
            reg="${reg%/}" # Remove extra "/" from end if exists
            dest="${reg}/${image##*/}"
            echo "Copying $image to $dest..."
            echo "--------------------------"
            ./regctl image copy "$source" "$dest"
          done
